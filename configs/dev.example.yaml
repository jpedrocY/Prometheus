# Prometheus local development config example.
# Copy to dev.local.yaml for personal local overrides; do not commit real values.
# See configs/README.md for policy.

runtime_mode_on_start: SAFE_MODE
entries_blocked_default: true
exchange_write_enabled: false
real_capital_enabled: false

adapter: fake

symbol: BTCUSDT
risk_fraction: 0.0025
max_effective_leverage: 2.0
internal_notional_cap_usdt: null   # must be set explicitly before any live stage

# Phase 2 research-data output paths (local, git-ignored).
# Example values only; there is no config loader yet, so these keys are
# documentation for operators running the pipeline manually.
research_data:
  data_root: data/normalized/klines
  derived_root: data/derived
  manifests_root: data/manifests
  fixture_version: v001

  # Phase 2b: Binance public bulk-download client settings.
  # Public endpoint; no credentials; read-only.
  binance_bulk:
    base_url: https://data.binance.vision
    raw_root: data/raw
    state_root: data/manifests/_downloads
    user_agent: "Prometheus-Research/0.0.0 (+https://github.com/jpedrocY/Prometheus)"
    pace_ms: 100

  # Phase 2c: mark-price + funding + exchangeInfo settings.
  # All public endpoints; no credentials; no signed requests.
  mark_price:
    # Uses the same bulk downloader as standard klines with family=markPriceKlines.
    raw_root: data/raw
    normalized_root: data/normalized/mark_price_klines
    manifests_root: data/manifests

  funding:
    # REST endpoint /fapi/v1/fundingRate on fapi.binance.com.
    # Rate limit (verified 2026-04-19): shares 500/5min/IP with /fapi/v1/fundingInfo.
    base_url: https://fapi.binance.com
    normalized_root: data/normalized/funding_rate
    manifests_root: data/manifests
    pace_ms: 1000  # conservative vs documented 500/5min/IP limit

  exchange_info:
    # REST endpoint /fapi/v1/exchangeInfo on fapi.binance.com. Weight 1.
    base_url: https://fapi.binance.com
    raw_root: data/raw
    derived_root: data/derived
    manifests_root: data/manifests

# Phase 3 research-only backtester settings.
# No config loader yet — documentation for operators running the
# engine via `uv run python -m prometheus.research.backtest.cli`.
# All values reflect operator decisions recorded in
# docs/00-meta/implementation-ambiguity-log.md GAP-014 through GAP-025.
backtest:
  # Fixed starting equity for flat (non-compounding) sizing (GAP-021).
  sizing_equity_usdt: 10000.0
  # Primary risk per trade. 0.005 and 0.01 are allowed research sweeps.
  risk_fraction: 0.0025
  # Initial live default per position-sizing-framework. 1.00 may be a
  # sensitivity run (GAP-022).
  risk_usage_fraction: 0.90
  # Locked v1 live cap. Raising this requires a separate risk-gate.
  max_effective_leverage: 2.0
  # Phase 3 research cap; distinct from the live tiny-live cap (TD-018).
  max_notional_internal_usdt: 100000.0
  # Taker fee sensitivity primary value (GAP-018). 0.0004 and 0.0002
  # should be run as sensitivity variants with different run_id.
  taker_fee_rate: 0.0005
  # Slippage bucket {LOW, MEDIUM, HIGH}; MEDIUM is the primary.
  slippage_bucket: MEDIUM
  # Backtest reports go under this root; git-ignored by the existing
  # data/derived/** pattern.
  reports_root: data/derived/backtests
  # FAKE is the ONLY supported adapter in Phase 3. Any later live
  # adapter requires a phase-gate-approved phase that adds a new
  # BacktestAdapter value.
  adapter: FAKE
